<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>


<body class="bg-white">

    <nav class="border-b border-gray-200 px-8 py-4 flex justify-between items-center bg-white sticky top-0 z-30">
    <div class="flex items-center gap-3">
        <h1 class="text-xl font-bold text-gray-800">GitHub Issues Tracker</h1>
    </div>
    <div class="flex gap-3">
        <input type="text" id="searchInput" placeholder="Search..." class="border rounded-md px-4 py-2">
        <button class="bg-purple-600 text-white px-5 py-2 rounded-md font-bold"> Search </button>
    </div>
</nav>

<main class="max-w-[1400px] mx-auto p-8" id="mainContent"></main>

    <main class="max-w-[1400px] mx-auto p-8">
        
        <div class="bg-white rounded-xl border border-gray-200 p-6 mb-8 shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
            <div class="flex gap-3 mb-6">
                <button id="tabAll" onclick="filterIssues('all')" class="px-8 py-2 rounded-md text-sm font-medium border border-gray-200 text-gray-600 hover:bg-gray-50 transition">All</button>
                <button id="tabOpen" onclick="filterIssues('open')" class="px-8 py-2 rounded-md text-sm font-medium border border-gray-200 text-gray-600 hover:bg-gray-50 transition">Open</button>
                <button id="tabClosed" onclick="filterIssues('closed')" class="px-8 py-2 rounded-md text-sm font-medium border border-gray-200 text-gray-600 hover:bg-gray-50 transition">Closed</button>
            </div>


            <div class="flex justify-between items-end border-t border-gray-100 pt-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-circle-dot text-2xl text-[#560df8]"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900"><span id="issueCount">0</span> Issues</h2>
                        <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>


                <div class="flex gap-6 text-sm font-medium">
                    <div class="flex items-center gap-2 text-gray-700">
                        <span class="w-3 h-3 bg-[#22c55e] rounded-full"></span> Open
                    </div>
                    <div class="flex items-center gap-2 text-gray-700">
                        <span class="w-3 h-3 bg-[#a855f7] rounded-full"></span> Closed
                    </div>
                </div>
            </div>
        </div>


        <div id="loader" class="hidden flex justify-center py-20">
            <div class="spinner"></div>
        </div>

        <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        </div>
    </main>



        <div id="issueModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden transform scale-100 transition-transform">
            <div id="modalContent" class="p-0"></div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
   if(window.location.pathname.includes('dashboard') && localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
        initDashboard();
    </script>
</body>
</html>å
