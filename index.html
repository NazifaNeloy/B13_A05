<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center">

   <body class="bg-gray-50 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
        <div class="flex flex-col items-center mb-6">
            <img src="./assets/github-logo.png" class="w-16 h-16 mb-4" alt="Logo">
            <h1 class="text-2xl font-bold text-gray-900">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>


        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
            <p class="text-xs text-gray-600">Default: admin</p>
            <input type="password" id="password" placeholder="Password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
            <p class="text-xs text-gray-600">Default: admin123</p>
            <button type="submit" class="w-full bg-[#560df8] hover:bg-[#450ac4] text-white font-bold py-2.5 rounded-lg transition">Sign In</button>
        </form>

        
        <div class="mt-8 pt-6 border-t border-gray-100">
            <p class="text-xs text-gray-500 mb-3 text-center">Demo Credentials:</p>
            <div class="bg-gray-50 rounded p-3 text-xs text-gray-600 inline-block w-full text-center">
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</body>
</html>
