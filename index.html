<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="./styles.css">
  
</head>
<body class="h-screen flex items-center justify-center bg-gray-50">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
        <div class="flex flex-col items-center mb-6">
            <img src="./assets/github-logo.png" class="w-16 h-16 mb-4">
            <h1 class="text-2xl font-bold text-gray-900">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 outline-none">
                <p class="text-xs text-purple-600 mt-1 font-medium">Default: admin</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 outline-none">
                <p class="text-xs text-purple-600 mt-1 font-medium">Default: admin123</p>
            </div>
            <button type="submit" class="w-full bg-[#560df8] hover:bg-[#450ac4] text-white font-bold py-2.5 rounded-lg transition duration-200 shadow-md">Sign In</button>
        </form>

        <div class="mt-6 border-t border-gray-100 pt-4 text-center">
            <p class="text-sm text-gray-500 mb-2">Demo Credentials:</p>
            <div class="bg-gray-50 py-2 px-4 rounded border border-gray-200 inline-block text-xs text-gray-600">
                <span class="font-bold">User:</span> admin &nbsp;|&nbsp; <span class="font-bold">Pass:</span> admin123
            </div>
        </div>
    </div>
</body>
</html>
